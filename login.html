<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Войти — AquaFlow</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body class="auth-body">

<!-- Animated background -->
<div class="auth-bg" aria-hidden="true">
  <div class="auth-bg-inner"></div>
  <div class="auth-bubbles">
    <div class="auth-bubble"></div>
    <div class="auth-bubble"></div>
    <div class="auth-bubble"></div>
    <div class="auth-bubble"></div>
    <div class="auth-bubble"></div>
  </div>
</div>

<div class="auth-center">
  <div class="auth-wrap">

    <!-- Logo -->
    <a href="index.html" class="auth-logo" aria-label="На главную">AquaFlow</a>

    <!-- Card -->
    <div class="auth-card">

      <!-- Tabs -->
      <div class="auth-tabs" role="tablist" aria-label="Войти или зарегистрироваться">
        <button class="auth-tab active" id="tab-login" role="tab" aria-selected="true"  aria-controls="panel-login">Войти</button>
        <button class="auth-tab"        id="tab-reg"   role="tab" aria-selected="false" aria-controls="panel-reg">Регистрация</button>
        <div class="auth-tab-indicator" id="tab-indicator"></div>
      </div>

      <!-- Login panel -->
      <div class="auth-panel active" id="panel-login" role="tabpanel" aria-labelledby="tab-login">
        <form class="auth-form" id="login-form" novalidate aria-label="Форма входа">
          <div class="form-group">
            <label class="form-label" for="login-email">Email <span class="req">*</span></label>
            <input type="email" id="login-email" class="form-input" placeholder="your@email.com"
                   autocomplete="email" required inputmode="email">
            <span class="form-error" id="err-login-email" aria-live="polite"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="login-pw">Пароль <span class="req">*</span></label>
            <div class="pw-wrap">
              <input type="password" id="login-pw" class="form-input" placeholder="Введите пароль"
                     autocomplete="current-password" required>
              <button type="button" class="pw-eye" id="login-pw-eye" aria-label="Показать пароль" aria-pressed="false">
                <svg class="eye-off" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                <svg class="eye-on" viewBox="0 0 24 24" style="display:none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="form-error" id="err-login-pw" aria-live="polite"></span>
          </div>

          <div class="auth-forgot-row">
            <a href="#" class="auth-forgot-link" tabindex="0">Забыли пароль?</a>
          </div>

          <button type="submit" class="btn btn-primary btn-lg auth-submit" id="login-submit">Войти</button>
        </form>

        <div class="auth-divider"><span>или</span></div>

        <button class="btn-social google" id="google-login-btn" aria-label="Войти через Google">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Войти с Google
        </button>
      </div>

      <!-- Register panel -->
      <div class="auth-panel" id="panel-reg" role="tabpanel" aria-labelledby="tab-reg" style="display:none">
        <form class="auth-form" id="reg-form" novalidate aria-label="Форма регистрации">
          <div class="form-group">
            <label class="form-label" for="reg-name">Имя <span class="req">*</span></label>
            <input type="text" id="reg-name" class="form-input" placeholder="Иван Петров"
                   autocomplete="name" required>
            <span class="form-error" id="err-reg-name" aria-live="polite"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="reg-email">Email <span class="req">*</span></label>
            <input type="email" id="reg-email" class="form-input" placeholder="your@email.com"
                   autocomplete="email" required inputmode="email">
            <span class="form-error" id="err-reg-email" aria-live="polite"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="reg-phone">Телефон</label>
            <input type="tel" id="reg-phone" class="form-input" placeholder="+7 (999) 000-00-00"
                   autocomplete="tel" inputmode="tel">
          </div>

          <div class="form-group">
            <label class="form-label" for="reg-pw">Пароль <span class="req">*</span></label>
            <div class="pw-wrap">
              <input type="password" id="reg-pw" class="form-input" placeholder="Минимум 8 символов"
                     autocomplete="new-password" required>
              <button type="button" class="pw-eye" id="reg-pw-eye" aria-label="Показать пароль" aria-pressed="false">
                <svg class="eye-off" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                <svg class="eye-on" viewBox="0 0 24 24" style="display:none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <div class="pw-strength-bar" role="progressbar" aria-valuemin="0" aria-valuemax="4" aria-valuenow="0" aria-label="Надёжность пароля">
              <div class="pw-strength-fill" id="pw-strength-fill"></div>
            </div>
            <span class="form-hint" id="pw-strength-label">Введите пароль</span>
            <span class="form-error" id="err-reg-pw" aria-live="polite"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="reg-pw2">Подтвердите пароль <span class="req">*</span></label>
            <div class="pw-wrap">
              <input type="password" id="reg-pw2" class="form-input" placeholder="Повторите пароль"
                     autocomplete="new-password" required>
              <button type="button" class="pw-eye" id="reg-pw2-eye" aria-label="Показать пароль" aria-pressed="false">
                <svg class="eye-off" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                <svg class="eye-on" viewBox="0 0 24 24" style="display:none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="form-error" id="err-reg-pw2" aria-live="polite"></span>
          </div>

          <button type="submit" class="btn btn-primary btn-lg auth-submit" id="reg-submit">Создать аккаунт</button>
        </form>

        <div class="auth-divider"><span>или</span></div>

        <button class="btn-social google" id="google-reg-btn" aria-label="Зарегистрироваться через Google">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Войти с Google
        </button>
      </div>

    </div>

    <p class="auth-back-link"><a href="index.html">← На главную</a></p>
  </div>
</div>

<script src="js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  /* Tab switching */
  const tabLogin  = document.getElementById('tab-login');
  const tabReg    = document.getElementById('tab-reg');
  const panelLogin = document.getElementById('panel-login');
  const panelReg   = document.getElementById('panel-reg');
  const indicator  = document.getElementById('tab-indicator');

  function activateTab(which) {
    const isLogin = which === 'login';
    tabLogin.classList.toggle('active', isLogin);
    tabReg.classList.toggle('active', !isLogin);
    tabLogin.setAttribute('aria-selected', isLogin);
    tabReg.setAttribute('aria-selected', !isLogin);
    panelLogin.style.display = isLogin ? '' : 'none';
    panelReg.style.display   = isLogin ? 'none' : '';
    panelLogin.classList.toggle('active', isLogin);
    panelReg.classList.toggle('active', !isLogin);
    indicator.style.transform = isLogin ? 'translateX(0)' : 'translateX(100%)';
  }

  tabLogin.addEventListener('click', () => activateTab('login'));
  tabReg.addEventListener('click',   () => activateTab('reg'));

  /* URL param: ?tab=reg */
  if (new URLSearchParams(location.search).get('tab') === 'reg') activateTab('reg');

  /* Password eye toggles */
  function initEye(btnId, inputId) {
    const btn   = document.getElementById(btnId);
    const input = document.getElementById(inputId);
    if (!btn || !input) return;
    btn.addEventListener('click', () => {
      const shown = input.type === 'text';
      input.type  = shown ? 'password' : 'text';
      btn.setAttribute('aria-pressed', !shown);
      btn.querySelector('.eye-off').style.display = shown ? '' : 'none';
      btn.querySelector('.eye-on').style.display  = shown ? 'none' : '';
    });
  }
  initEye('login-pw-eye',  'login-pw');
  initEye('reg-pw-eye',    'reg-pw');
  initEye('reg-pw2-eye',   'reg-pw2');

  /* Password strength */
  const regPwInput = document.getElementById('reg-pw');
  const strengthFill  = document.getElementById('pw-strength-fill');
  const strengthLabel = document.getElementById('pw-strength-label');
  const STRENGTH_COLORS = ['#EF4444','#F97316','#EAB308','#22C55E','#0284C7'];
  const STRENGTH_LABELS = ['Очень слабый','Слабый','Средний','Хороший','Отличный'];

  function calcStrength(pw) {
    let s = 0;
    if (pw.length >= 8)   s++;
    if (/[A-Z]/.test(pw)) s++;
    if (/[0-9]/.test(pw)) s++;
    if (/[^A-Za-z0-9]/.test(pw)) s++;
    return s;
  }
  regPwInput && regPwInput.addEventListener('input', () => {
    const pw = regPwInput.value;
    if (!pw) { strengthFill.style.width='0'; strengthLabel.textContent='Введите пароль'; return; }
    const s = calcStrength(pw);
    strengthFill.style.width  = `${(s / 4) * 100}%`;
    strengthFill.style.background = STRENGTH_COLORS[s];
    strengthLabel.textContent = STRENGTH_LABELS[s];
    document.querySelector('.pw-strength-bar').setAttribute('aria-valuenow', s);
  });

  /* Login form */
  document.getElementById('login-form').addEventListener('submit', e => {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    const pw    = document.getElementById('login-pw').value;
    let valid   = true;

    document.getElementById('err-login-email').textContent = '';
    document.getElementById('err-login-pw').textContent    = '';

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      document.getElementById('err-login-email').textContent = 'Введите корректный email';
      valid = false;
    }
    if (!pw || pw.length < 6) {
      document.getElementById('err-login-pw').textContent = 'Минимум 6 символов';
      valid = false;
    }
    if (!valid) return;

    const btn = document.getElementById('login-submit');
    btn.disabled    = true;
    btn.textContent = 'Входим...';
    setTimeout(() => { location.href = 'index.html'; }, 1000);
  });

  /* Register form */
  document.getElementById('reg-form').addEventListener('submit', e => {
    e.preventDefault();
    const name  = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pw    = document.getElementById('reg-pw').value;
    const pw2   = document.getElementById('reg-pw2').value;
    let valid   = true;

    ['err-reg-name','err-reg-email','err-reg-pw','err-reg-pw2'].forEach(id => {
      document.getElementById(id).textContent = '';
    });

    if (!name) {
      document.getElementById('err-reg-name').textContent = 'Введите имя';
      valid = false;
    }
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      document.getElementById('err-reg-email').textContent = 'Введите корректный email';
      valid = false;
    }
    if (!pw || pw.length < 8) {
      document.getElementById('err-reg-pw').textContent = 'Минимум 8 символов';
      valid = false;
    }
    if (pw !== pw2) {
      document.getElementById('err-reg-pw2').textContent = 'Пароли не совпадают';
      valid = false;
    }
    if (!valid) return;

    const btn = document.getElementById('reg-submit');
    btn.disabled    = true;
    btn.textContent = 'Создаём аккаунт...';
    setTimeout(() => { location.href = 'index.html'; }, 1200);
  });

  /* Google buttons (fake) */
  ['google-login-btn','google-reg-btn'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('click', () => {
      el.disabled    = true;
      el.textContent = 'Перенаправляем...';
      setTimeout(() => { location.href = 'index.html'; }, 800);
    });
  });
});
</script>
</body>
</html>
